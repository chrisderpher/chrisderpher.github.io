<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="robots" content="noindex, nofollow" />
	<title>Murphy Home Services</title>
	<link rel="icon" href="../images/cmlogo.png" />
	<link rel="stylesheet" href="../assets/css/fontawesome-all.min.css" />
	<style>
		/* ===== Theme (matches chrismurphy.org "Dimension" palette, a touch nicer) ===== */
		:root {
			--bg: #1b1f22;
			--bg-alt: #000000;
			--fg: #ffffff;
			--fg-light: rgba(255, 255, 255, 0.6);
			--fg-dim: rgba(255, 255, 255, 0.4);
			--border: rgba(255, 255, 255, 0.15);
			--border-strong: rgba(255, 255, 255, 0.35);
			--panel: rgba(27, 31, 34, 0.55);
			--panel-hover: rgba(35, 41, 46, 0.85);
			--accent: #4fd1c5;
			--accent-2: #7f9cf5;
			--radius: 14px;
		}

		* { box-sizing: border-box; }

		html, body { margin: 0; padding: 0; }

		body {
			min-height: 100vh;
			font-family: 'Source Sans Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
			font-weight: 300;
			color: var(--fg);
			background-color: var(--bg);
			-webkit-font-smoothing: antialiased;
			letter-spacing: 0.02rem;
		}

		/* Background: blurred photo + dark overlay, like the main site */
		#bg {
			position: fixed;
			inset: 0;
			z-index: -1;
			background:
				linear-gradient(to top, rgba(19, 21, 25, 0.78), rgba(19, 21, 25, 0.92)),
				url('../images/bg.jpg') center / cover no-repeat;
		}
		#bg::after {
			content: '';
			position: absolute;
			inset: 0;
			background: url('../images/overlay.png') repeat;
			opacity: 0.5;
		}

		.wrap {
			max-width: 1100px;
			margin: 0 auto;
			padding: 3.5rem 1.5rem 4rem;
		}

		/* ===== Header ===== */
		header.hero {
			text-align: center;
			margin-bottom: 3rem;
		}
		header.hero img.logo {
			width: 70px;
			height: auto;
			margin-bottom: 1rem;
			opacity: 0.95;
		}
		header.hero h1 {
			margin: 0;
			font-size: 2.5rem;
			font-weight: 600;
			letter-spacing: 0.4rem;
			text-transform: uppercase;
		}
		header.hero p.tagline {
			margin: 0.75rem auto 0;
			max-width: 620px;
			color: var(--fg-light);
			font-size: 1.05rem;
			line-height: 1.6;
		}
		header.hero .accent-rule {
			width: 60px;
			height: 3px;
			margin: 1.5rem auto 0;
			border-radius: 3px;
			background: linear-gradient(90deg, var(--accent), var(--accent-2));
		}

		/* ===== Section headings ===== */
		.section { margin-bottom: 3rem; }
		.section-head {
			display: flex;
			align-items: baseline;
			gap: 0.75rem;
			margin: 0 0 1.25rem;
			padding-bottom: 0.6rem;
			border-bottom: 1px solid var(--border);
		}
		.section-head h2 {
			margin: 0;
			font-size: 0.9rem;
			font-weight: 600;
			letter-spacing: 0.35rem;
			text-transform: uppercase;
			color: var(--fg);
		}
		.section-head .sub {
			font-size: 0.8rem;
			color: var(--fg-dim);
			letter-spacing: 0.05rem;
		}

		/* ===== Card grid ===== */
		.grid {
			display: grid;
			gap: 1.1rem;
			grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
		}
		.grid.featured {
			grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
		}

		.card {
			position: relative;
			display: flex;
			align-items: center;
			gap: 1rem;
			padding: 1.25rem 1.35rem;
			text-decoration: none;
			color: var(--fg);
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
			transition: transform 0.18s ease, border-color 0.18s ease,
				background 0.18s ease, box-shadow 0.18s ease;
		}
		.card:hover {
			transform: translateY(-4px);
			background: var(--panel-hover);
			border-color: var(--border-strong);
			box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45);
		}
		.card .icon {
			flex: 0 0 auto;
			width: 52px;
			height: 52px;
			display: grid;
			place-items: center;
			border-radius: 12px;
			font-size: 1.35rem;
			color: #fff;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid var(--border);
		}
		.card .body { min-width: 0; }
		.card .body h3 {
			margin: 0;
			font-size: 1.15rem;
			font-weight: 600;
			letter-spacing: 0.03rem;
		}
		.card .body p {
			margin: 0.2rem 0 0;
			font-size: 0.85rem;
			line-height: 1.4;
			color: var(--fg-light);
		}
		.card .go {
			position: absolute;
			top: 1.1rem;
			right: 1.2rem;
			color: var(--fg-dim);
			font-size: 0.85rem;
			opacity: 0;
			transform: translateX(-4px);
			transition: opacity 0.18s ease, transform 0.18s ease;
		}
		.card:hover .go { opacity: 1; transform: translateX(0); }

		/* Featured cards a little larger / brighter */
		.grid.featured .card { padding: 1.6rem 1.5rem; }
		.grid.featured .card .icon { width: 60px; height: 60px; font-size: 1.6rem; }
		.grid.featured .card .body h3 { font-size: 1.35rem; }

		/* Per-service accent tints (icon background) */
		.t-jellyfin .icon { background: linear-gradient(135deg, #aa5cc3, #00a4dc); border-color: transparent; }
		.t-sonarr   .icon { background: linear-gradient(135deg, #2596be, #163a4a); border-color: transparent; }
		.t-plex     .icon { background: linear-gradient(135deg, #e5a00d, #cc7b19); border-color: transparent; }
		.t-immich   .icon { background: linear-gradient(135deg, #4250af, #1d2660); border-color: transparent; }
		.t-pihole   .icon { background: linear-gradient(135deg, #b91c1c, #7f1d1d); border-color: transparent; }
		.t-hass     .icon { background: linear-gradient(135deg, #18bcf2, #0b6e8c); border-color: transparent; }
		.t-qbit     .icon { background: linear-gradient(135deg, #2f67b1, #1b3d6b); border-color: transparent; }
		.t-printer  .icon { background: linear-gradient(135deg, #41b883, #2c7a55); border-color: transparent; }

		/* ===== Footer ===== */
		footer {
			margin-top: 3.5rem;
			text-align: center;
			color: var(--fg-dim);
			font-size: 0.85rem;
		}
		footer a { color: var(--fg-light); text-decoration: none; }
		footer a:hover { color: var(--fg); }

		@media (max-width: 600px) {
			header.hero h1 { font-size: 1.8rem; letter-spacing: 0.25rem; }
			.wrap { padding-top: 2.5rem; }
		}
	</style>
</head>
<body>
	<div id="bg"></div>

	<div class="wrap">
		<header class="hero">
			<img class="logo" src="../images/cmlogo.png" alt="Chris Murphy" />
			<h1>Home Services</h1>
			<p class="tagline">
				Welcome! Pick a service below. <strong>Jellyfin</strong> and
				<strong>Sonarr</strong> are what most folks are after &mdash; everything
				else is here mostly for me.
			</p>
			<div class="accent-rule"></div>
		</header>

		<!-- Sections are generated from the SERVICES config below -->
		<main id="dashboard"></main>

		<footer>
			<p>&copy; <span id="year"></span> Chris Murphy &middot;
				<a href="../index.html">chrismurphy.org</a></p>
		</footer>
	</div>

	<script>
		/* =====================================================================
		 *  SERVICE CONFIG  ---  EDIT THIS BLOCK
		 * ---------------------------------------------------------------------
		 *  Each entry: { name, desc, url, icon (Font Awesome class), theme }
		 *
		 *  IMPORTANT about URLs:
		 *  The addresses below are LAN (192.168.x.x) addresses. Those ONLY work
		 *  for someone already on your home network.
		 *
		 *  Friends/family hitting stream.chrismurphy.org from the internet will
		 *  NOT be able to reach 192.168.x.x links. For external access you need
		 *  to expose each service publicly (reverse proxy is the clean way,
		 *  e.g. Nginx Proxy Manager / Caddy / Traefik) and point these URLs at
		 *  the public hostnames, for example:
		 *     url: "https://jellyfin.chrismurphy.org"
		 *     url: "https://sonarr.chrismurphy.org"
		 *
		 *  Set USE_PUBLIC = true once you've set up public hostnames and filled
		 *  in the `public` field on each service. Until then it uses `lan`.
		 * ===================================================================== */
		const USE_PUBLIC = false;

		const SERVICES = {
			featured: [
				{
					name: "Jellyfin",
					desc: "Stream movies & TV in your browser or app.",
					lan: "http://192.168.1.2:8096",
					public: "https://jellyfin.chrismurphy.org",
					icon: "fas fa-film",
					theme: "t-jellyfin"
				},
				{
					name: "Sonarr",
					desc: "Browse & request TV shows for the library.",
					lan: "http://192.168.1.2:8989",
					public: "https://sonarr.chrismurphy.org",
					icon: "fas fa-tv",
					theme: "t-sonarr"
				}
			],
			personal: [
				{
					name: "Plex",
					desc: "Alternate media server & streaming.",
					lan: "http://192.168.1.2:32400/web",
					public: "https://plex.chrismurphy.org",
					icon: "fas fa-play",
					theme: "t-plex"
				},
				{
					name: "Immich",
					desc: "Self-hosted photo & video library.",
					lan: "http://192.168.1.2:2283",
					public: "https://immich.chrismurphy.org",
					icon: "fas fa-images",
					theme: "t-immich"
				},
				{
					name: "qBittorrent",
					desc: "Download client web UI.",
					lan: "http://192.168.1.2:8080",
					public: "https://qbit.chrismurphy.org",
					icon: "fas fa-download",
					theme: "t-qbit"
				},
				{
					name: "Pi-hole",
					desc: "Network-wide ad blocking & DNS.",
					lan: "http://192.168.1.2/admin",
					public: "https://pihole.chrismurphy.org/admin",
					icon: "fas fa-shield-alt",
					theme: "t-pihole"
				},
				{
					name: "Home Assistant",
					desc: "Smart-home control & automations.",
					lan: "http://192.168.1.3:8123",
					public: "https://hass.chrismurphy.org",
					icon: "fas fa-home",
					theme: "t-hass"
				}
			],
			printers: [
				{
					name: "Oneder",
					desc: "3D printer · OctoPrint / Klipper",
					lan: "http://192.168.1.9",
					public: "https://oneder.chrismurphy.org",
					icon: "fas fa-cube",
					theme: "t-printer"
				},
				{
					name: "Seconder",
					desc: "3D printer · OctoPrint / Klipper",
					lan: "http://192.168.1.10",
					public: "https://seconder.chrismurphy.org",
					icon: "fas fa-cube",
					theme: "t-printer"
				},
				{
					name: "Thirder",
					desc: "3D printer · OctoPrint / Klipper",
					lan: "http://192.168.1.11",
					public: "https://thirder.chrismurphy.org",
					icon: "fas fa-cube",
					theme: "t-printer"
				},
				{
					name: "Fourther",
					desc: "3D printer · OctoPrint / Klipper",
					lan: "http://192.168.1.12",
					public: "https://fourther.chrismurphy.org",
					icon: "fas fa-cube",
					theme: "t-printer"
				}
			]
		};

		/* ===== Renderer (no need to edit below) ===== */
		function resolveUrl(svc) {
			return (USE_PUBLIC && svc.public) ? svc.public : svc.lan;
		}

		function cardHtml(svc) {
			const url = resolveUrl(svc);
			return `
				<a class="card ${svc.theme}" href="${url}" target="_blank" rel="noopener noreferrer">
					<span class="icon"><i class="${svc.icon}"></i></span>
					<span class="body">
						<h3>${svc.name}</h3>
						<p>${svc.desc}</p>
					</span>
					<span class="go"><i class="fas fa-arrow-right"></i></span>
				</a>`;
		}

		function sectionHtml(title, sub, services, featured) {
			const cards = services.map(cardHtml).join("");
			return `
				<section class="section">
					<div class="section-head">
						<h2>${title}</h2>
						<span class="sub">${sub}</span>
					</div>
					<div class="grid ${featured ? "featured" : ""}">${cards}</div>
				</section>`;
		}

		const dashboard = document.getElementById("dashboard");
		dashboard.innerHTML = [
			sectionHtml("Streaming &amp; Media", "What you're probably here for", SERVICES.featured, true),
			sectionHtml("More Services", "Mostly for me", SERVICES.personal, false),
			sectionHtml("3D Printers", "Pi-powered print farm", SERVICES.printers, false)
		].join("");

		document.getElementById("year").textContent = new Date().getFullYear();
	</script>
</body>
</html>
