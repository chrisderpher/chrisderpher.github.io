name: Update throne data

on:
  schedule:
    - cron: "15 23 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Updater mode"
        required: false
        type: choice
        default: daily
        options:
          - daily
          - monthly
          - rebuild

permissions:
  contents: write

concurrency:
  group: throne-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-throne:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Preflight FMP secret
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          if [ -z "$FMP_API_KEY" ]; then
            echo "::error::Missing required repository secret FMP_API_KEY."
            exit 1
          fi

      - name: Test succession rules
        run: node --test scripts/throne-core.test.js

      - name: Refresh throne data
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          MODE="${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'daily' }}"
          case "$MODE" in
            daily)
              node scripts/update-throne.js
              ;;
            monthly)
              node scripts/update-throne.js --monthly
              ;;
            rebuild)
              node scripts/update-throne.js --rebuild
              ;;
            *)
              echo "::error::Unknown throne updater mode: $MODE"
              exit 1
              ;;
          esac

      - name: Commit updated data
        run: |
          git pull --rebase --autostash origin master

          if git diff --quiet -- data/throne.json; then
            echo "No throne data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/throne.json
          git commit -m "Update throne data"
          git push
